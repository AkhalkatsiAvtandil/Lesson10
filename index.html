  <body>
    <main>
      <footer>
        <section class="container">
          <div class="parrent">
            <h1>კონტაქტი</h1>
            <p>
              Lorem Ipsum საბეჭდი და ტიპოგრაფიული ინდუსტრიის უშინაარსო ტექსტია.
              იგი სტანდარტად 1500-იანი წლებიდან იქცა, როდესაც უცნობმა მბეჭდავმა
              ამწყობ დაზგაზე წიგნის საცდელი ეგზემპლარი დაბეჭდა.
            </p>
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d47639.05959777594!2d44.72066834863282!3d41.732575!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x404472b82b6f835d%3A0x13d9fb6a0fac64e2!2sM%2FS%20Nadzaladevi!5e0!3m2!1sen!2sge!4v1775418284865!5m2!1sen!2sge"
              width="600"
              height="450"
              style="border: 2"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
            <span class="phone-mail">
              <img src="assets/img/2.png" alt="phone icon" />
              <a href="#">+995 123 456 789</a>
              <img src="assets/img/3.png" alt="letter icon" />
              <a href="#">example@gmail.com</a>
            </span>
          </div>
          <form action="#">
            <nav class="form-field">
              <ul>
                <li>
                  <input
                    type="text"
                    name="user_name"
                    placeholder="სახელი, გვარი"
                    id="name,surename"
                    required
                  />
                </li>
                <li>
                  <input
                    type="email"
                    name="user_email"
                    placeholder="ელ.ფოსტა"
                    id="email"
                    required
                  />
                </li>
                <li>
                  <input
                    type="number"
                    name="user_phone"
                    placeholder="ტელეფონის ნომერი"
                    id="phone-number"
                    required
                  />
                </li>
                <li>
                  <textarea
                    name="message"
                    id="message"
                    placeholder="შეტყობინება"
                    rows="4"
                    cols="30"
                  >
                  </textarea>
                </li>
                <span class="button">
                  <button type="submit">გაგზავნა</button>
                </span>
              </ul>
            </nav>
          </form>
        </section>
      </footer>
